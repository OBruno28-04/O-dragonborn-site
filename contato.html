<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>O Dragonborn</title>
	<link rel="shortcut icon" href="imagens/icone.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="css/style.css">
<link rel="stylesheet" type="text/css" href="css/all.min.css">
</head>

<body>
	<header>
		<a href="index.html" title="Home">
			<img src="imagens/logo.webp" alt="Dragonborn" title="Dragonborn">
		</a>

		<a href="javascript:mostrarmenu()" class="menu">
			<i class="fas fa-bars"></i>
		</a>

		<nav>
			<ul>
			<li>
				<a href="index.html" title="home">
					<i class="fas fa-home"></i>
					Home
				</a>
			</li>
			<li>
				<a href="contato.html" title="Contato">
					<i class="fas fa-envelope"></i>
					Contato
				</a>
			</li>	
			<li>
				<a href="jogar.html" title="Jogar">
					<i class="fas fa-gamepad"></i>
					Jogar
				</a>
			</li>	

			</ul>
		</nav>
	</header>

	<div class="banner">
		<img src="imagens/banner.jpg" alt="Banner" title="Banner">
	</div>

	<main>

	<h1>Contato</h1>  

	<form onsubmit="return validarFormulario()">

		<p>
			<label>Nome:</label><br>
			<input type="text" id="nome" required autocomplete="off">
		</p>

		<p>
			<label>Email:</label><br>
			<input type="email" id="email" required autocomplete="off">
		</p>

		<p>
			<label>Telefone:</label><br>
			<input type="tel" id="telefone" required autocomplete="off">
		</p>

		<p>
			<label>Mensagem:</label><br>
			<textarea name="mensagem"></textarea>
		</p>

		<p>
			<button type="submit">Enviar</button>
		</p>

	</form>

</main>


	<footer>
		<p>Desenvolvido por Bruno Gabriel Rodrigues</p>
		<p>
			<a href="https://facebook.com" title="Facebook">
				<i class="fab fa-facebook"></i>
			</a>
			<a href="https://instagram.com" title="Instagram">
				<i class="fab fa-instagram"></i>
			</a>
			<a href="https://twitter.com" title="twitter">
				<i class="fab fa-twitter"></i>
			</a>
		</p>
	</footer>

	<script>
		function mostrarmenu() {
			document.querySelector("header nav").classList.toggle("mostrar");
		}

function validarFormulario() {
	let nome = document.getElementById("nome").value;
	let email = document.getElementById("email").value;
	let telefone = document.getElementById("telefone").value;

	if (nome == "" || email == "" || telefone == "") {
		alert("Preencha todos os campos!");
		return false;
	}

	alert("Dados enviados:\nNome: " + nome + "\nEmail: " + email + "\nTelefone: " + telefone);
	return false;
}
</script>
</body>
</html>
